<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cegavi — Experience Intelligence</title>
<meta id="meta-desc" name="description" content="The only platform that correlates technical APM, digital behavior, and NPS in real time.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --paper:#FFFFFF;--paper2:#F5F5F5;--paper3:#EBEBEB;
  --ink:#0A0A0F;--ink2:#1C1C28;--ink3:#3D3D52;--ink4:#72728A;
  --blue:#1A6BFF;--blue2:#0A5BEF;--blue3:rgba(26,107,255,.12);--blue4:rgba(26,107,255,.06);
  --teal:#00A98B;--teal2:#008F76;--teal3:rgba(0,169,139,.15);--teal4:rgba(0,169,139,.07);
  --bd:#E8E8E8;--bd2:#CCCCCC;
  --f:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:var(--f);font-size:16px;overflow-x:hidden;line-height:1.6}
::selection{background:var(--blue);color:#fff}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ── i18n: all translatable elements hidden until JS runs ── */
[data-en],[data-pt]{display:none}

/* ── LANG SWITCHER ── */
.lang-sw{display:flex;align-items:center;border:1px solid var(--bd);border-radius:7px;overflow:hidden;flex-shrink:0}
.lang-btn{padding:5px 12px;font-family:var(--fm);font-size:11px;font-weight:600;color:var(--ink4);cursor:pointer;border:none;background:transparent;transition:all .13s;letter-spacing:.3px}
.lang-btn.on{background:var(--ink);color:#fff}
.lang-btn:not(.on):hover{background:var(--paper2);color:var(--ink)}
.lang-sep{width:1px;background:var(--bd);align-self:stretch}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;display:flex;align-items:center;padding:0 32px;transition:all .3s}
nav.scrolled{background:rgba(255,255,255,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);box-shadow:0 1px 16px rgba(10,10,15,.06)}
.ni{width:100%;max-width:1140px;margin:0 auto;display:flex;align-items:center;gap:16px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.lw{font-size:19px;font-weight:900;letter-spacing:-.02em;line-height:1}
.lw .ce{color:#0A0A0F}.lw .gav{color:#1A6BFF}
.lw .li{color:#00C9A7;position:relative;display:inline-block}
.lw .li::before{content:'';position:absolute;top:-3px;left:0;right:0;height:2.5px;background:#00C9A7;border-radius:2px}
.nav-links{display:flex;align-items:center;gap:26px;margin:0 auto}
.nav-links a{font-size:13px;color:var(--ink3);text-decoration:none;transition:color .13s;font-weight:500}
.nav-links a:hover{color:var(--ink)}
.nr{display:flex;align-items:center;gap:10px;flex-shrink:0}
.btn-g{padding:8px 18px;border-radius:8px;border:1px solid var(--bd2);color:var(--ink3);font-size:13px;font-weight:500;text-decoration:none;transition:all .14s;background:transparent;cursor:pointer}
.btn-g:hover{border-color:var(--bd);color:var(--ink);background:var(--paper2)}
.btn-p{padding:8px 18px;border-radius:8px;background:var(--blue);color:#fff;font-size:13px;font-weight:600;text-decoration:none;border:none;cursor:pointer;transition:all .14s;display:inline-flex;align-items:center;gap:6px}
.btn-p:hover{background:var(--blue2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,107,255,.25)}
.btn-lg{padding:14px 28px;font-size:15px;border-radius:10px}

/* ── HERO ── */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:140px 24px 100px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 30% 40%,rgba(26,107,255,.04),transparent),radial-gradient(ellipse 50% 40% at 70% 60%,rgba(0,169,139,.03),transparent);pointer-events:none}
.hero::after{content:'';position:absolute;inset:0;background-image:linear-gradient(var(--bd) 1px,transparent 1px),linear-gradient(90deg,var(--bd) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;mask-image:radial-gradient(ellipse at center,black 20%,transparent 75%);opacity:.4}
.hc{position:relative;z-index:1;max-width:820px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px;border:1px solid var(--teal3);background:var(--teal4);font-family:var(--fm);font-size:11px;color:var(--teal);margin-bottom:28px;letter-spacing:.5px}
.bdot{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
h1{font-size:clamp(40px,6.5vw,84px);font-weight:900;line-height:1.0;letter-spacing:-.03em;color:var(--ink);margin-bottom:12px}
h1 .bl{color:var(--blue)}h1 .te{color:var(--teal)}
.hsub{font-size:clamp(16px,2vw,19px);color:var(--ink3);max-width:580px;margin:0 auto 40px;line-height:1.7}
.hact{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:64px}
.hkpis{display:inline-flex;justify-content:center;gap:48px;flex-wrap:wrap;padding:24px 40px;background:var(--paper);border:1px solid var(--bd);border-radius:16px;box-shadow:0 2px 24px rgba(10,10,15,.06)}
.kpi{text-align:center}
.kn{font-size:32px;font-weight:900;letter-spacing:-.03em;line-height:1}
.kn.b{color:var(--blue)}.kn.t{color:var(--teal)}.kn.i{color:var(--ink)}
.kl{font-family:var(--fm);font-size:10px;color:var(--ink4);margin-top:5px;letter-spacing:1px;text-transform:uppercase}
.ksep{width:1px;background:var(--bd);align-self:stretch}

/* ── SECTIONS ── */
section,.section-like{padding:100px 24px}
.inner{max-width:1140px;margin:0 auto}
.sl{display:flex;align-items:center;gap:10px;font-family:var(--fm);font-size:10px;color:var(--teal);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.sl::before{content:'';width:20px;height:1px;background:var(--teal)}
h2{font-size:clamp(28px,4vw,48px);font-weight:800;line-height:1.1;letter-spacing:-.02em;color:var(--ink);margin-bottom:16px}
h2 .bl{color:var(--blue)}h2 .te{color:var(--teal)}
.ssub{font-size:17px;color:var(--ink3);line-height:1.7;max-width:560px}

/* ── PROBLEM ── */
.problem{background:var(--paper2)}
.silos{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:52px}
.silo{background:var(--paper);border:1px solid var(--bd);border-radius:14px;padding:26px;position:relative;overflow:hidden;transition:box-shadow .2s}
.silo:hover{box-shadow:0 4px 24px rgba(10,10,15,.08)}
.silo::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.silo.cx::before{background:linear-gradient(90deg,var(--blue),#6DA4FF)}
.silo.tech::before{background:linear-gradient(90deg,var(--teal),#00E8C2)}
.silo.sup::before{background:linear-gradient(90deg,#7C3AED,#A78BFA)}
.sico{font-size:24px;margin-bottom:14px}
.stit{font-family:var(--fm);font-size:10px;color:var(--ink4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
.sitems{display:flex;flex-direction:column;gap:7px}
.sitem{font-size:13px;color:var(--ink3);display:flex;align-items:center;gap:8px}
.sitem::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--bd2);flex-shrink:0}
.disc{margin-top:28px;padding:16px 20px;background:var(--blue4);border:1px solid var(--blue3);border-radius:10px;display:flex;align-items:center;gap:12px;font-size:14px;color:var(--ink2)}
.disc strong{color:var(--blue)}

/* ── HOW ── */
.how-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start}
.cascade{display:flex;flex-direction:column}
.cstep{display:flex;gap:20px;position:relative;padding-bottom:8px}
.cstep::before{content:'';position:absolute;left:19px;top:40px;bottom:-8px;width:1px;background:var(--bd)}
.cstep:last-child::before{display:none}
.cdot{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--paper);border:2px solid}
.cbody{flex:1;padding:0 0 24px}
.ctime{font-family:var(--fm);font-size:10px;margin-bottom:4px;letter-spacing:.5px}
.ctitle{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:3px}
.cdesc{font-size:13px;color:var(--ink3);line-height:1.5}
.chip{display:inline-flex;align-items:center;font-family:var(--fm);font-size:9px;padding:2px 8px;border-radius:4px;margin-top:6px;border:1px solid}

/* ── FEATURES ── */
.features{background:var(--paper2)}
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:52px}
.fc{background:var(--paper);border:1px solid var(--bd);border-radius:14px;padding:26px;transition:all .2s}
.fc:hover{box-shadow:0 6px 28px rgba(10,10,15,.09);transform:translateY(-2px);border-color:var(--bd2)}
.fi{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:16px}
.fi.b{background:var(--blue4);border:1px solid var(--blue3)}
.fi.t{background:var(--teal4);border:1px solid var(--teal3)}
.ftit{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:8px}
.fdesc{font-size:13px;color:var(--ink3);line-height:1.65}

/* ── PRICING ── */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:52px}
.pc{background:var(--paper);border:2px solid var(--bd);border-radius:16px;padding:30px;position:relative;transition:all .2s}
.pc.feat{border-color:var(--blue);box-shadow:0 0 0 4px var(--blue4)}
.pc:hover:not(.feat){border-color:var(--bd2);box-shadow:0 4px 20px rgba(10,10,15,.08)}
.pbadge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;font-family:var(--fm);font-size:10px;padding:3px 14px;border-radius:10px;white-space:nowrap}
.pname{font-family:var(--fm);font-size:11px;color:var(--ink4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.pval{font-size:38px;font-weight:900;color:var(--ink);line-height:1;margin-bottom:4px;letter-spacing:-.02em}
.pper{font-family:var(--fm);font-size:11px;color:var(--ink4);margin-bottom:22px}
.pfl{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:26px}
.pfl li{font-size:13px;color:var(--ink2);display:flex;align-items:flex-start;gap:9px}
.pfl li::before{content:'✓';color:var(--teal);flex-shrink:0;font-size:12px;margin-top:1px;font-weight:700}
.pcta{width:100%;padding:12px;border-radius:9px;border:1px solid var(--bd2);background:transparent;color:var(--ink);font-size:14px;font-weight:600;cursor:pointer;transition:all .14s;font-family:var(--f)}
.pcta:hover{background:var(--paper2)}
.pcta.feat-cta{background:var(--blue);border-color:var(--blue);color:#fff}
.pcta.feat-cta:hover{background:var(--blue2)}

/* ── FORM ── */
.lead-s{background:var(--paper2);padding:100px 24px;position:relative;overflow:hidden}
.lead-s::before{content:'';position:absolute;bottom:-120px;right:-120px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,var(--blue4),transparent);pointer-events:none}
.lead-grid{max-width:980px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;position:relative;z-index:1}
.trust{display:flex;flex-direction:column;gap:13px;margin-top:30px}
.trust-item{display:flex;align-items:center;gap:12px;font-size:14px;color:var(--ink2)}
.tcheck{width:20px;height:20px;border-radius:50%;background:var(--teal4);border:1px solid var(--teal3);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--teal);flex-shrink:0;font-weight:700}
.lcard{background:var(--paper);border:1px solid var(--bd);border-radius:16px;padding:32px;position:relative;overflow:hidden;box-shadow:0 4px 32px rgba(10,10,15,.08)}
.lcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--teal))}
.lbl{font-family:var(--fm);font-size:9px;color:var(--ink4);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.lrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.lfield{margin-bottom:10px}
.linp{width:100%;padding:11px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--paper);font-size:13px;color:var(--ink);font-family:var(--f);outline:none;transition:border-color .14s}
.linp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue4)}
.linp::placeholder{color:var(--ink4)}
.lsel{width:100%;padding:11px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--paper);font-size:13px;color:var(--ink);font-family:var(--f);outline:none;cursor:pointer}
.lta{width:100%;padding:11px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--paper);font-size:13px;color:var(--ink);font-family:var(--f);outline:none;resize:none;line-height:1.5;transition:border-color .14s}
.lta:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue4)}
.lta::placeholder{color:var(--ink4)}
.lmsg{display:none;padding:10px 12px;border-radius:7px;font-size:12px;font-family:var(--fm);margin-bottom:10px}
.lmsg.err{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.15);color:#DC2626}
.lmsg.ok{background:var(--teal4);border:1px solid var(--teal3);color:var(--teal)}
.lsub{width:100%;padding:13px;border-radius:9px;background:var(--blue);color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--f)}
.lsub:hover:not(:disabled){background:var(--blue2);box-shadow:0 6px 20px rgba(26,107,255,.25)}
.lsub:disabled{opacity:.5;cursor:not-allowed}
.lprivacy{font-size:11px;color:var(--ink4);text-align:center;margin-top:12px;font-family:var(--fm)}
.lsucc{display:none;text-align:center;padding:16px 0}
.lsucc-ico{font-size:44px;margin-bottom:14px}
.lsucc-title{font-size:19px;font-weight:700;color:var(--ink);margin-bottom:8px}
.lsucc-sub{font-size:13px;color:var(--ink3);line-height:1.6;margin-bottom:14px}
.lsucc-email{font-family:var(--fm);font-size:12px;color:var(--teal);background:var(--teal4);padding:5px 12px;border-radius:5px;display:inline-block}

/* ── CTA ── */
.cta-s{padding:100px 24px;text-align:center;position:relative;overflow:hidden;border-top:1px solid var(--bd)}
.cta-s::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:600px;height:400px;border-radius:50%;background:radial-gradient(circle,var(--blue4),transparent);pointer-events:none}
.cta-h{font-size:clamp(24px,4vw,44px);font-weight:800;color:var(--ink);margin-bottom:14px;letter-spacing:-.02em}
.cta-sub{font-size:17px;color:var(--ink3);margin-bottom:32px}
.cta-act{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.cta-note{font-family:var(--fm);font-size:11px;color:var(--ink4);letter-spacing:.5px}

/* ── FOOTER ── */
footer{padding:52px 24px 32px;border-top:1px solid var(--bd);background:var(--paper2)}
.fi2{max-width:1140px;margin:0 auto}
.ft{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:48px;margin-bottom:40px}
.fsub{font-size:13px;color:var(--ink4);line-height:1.65;margin-bottom:10px}
.femail{font-family:var(--fm);font-size:12px;color:var(--ink4)}
.fct{font-family:var(--fm);font-size:9px;color:var(--ink4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px}
.flinks{list-style:none;display:flex;flex-direction:column;gap:9px}
.flinks a{font-size:13px;color:var(--ink3);text-decoration:none;transition:color .13s}
.flinks a:hover{color:var(--ink)}
.fb{display:flex;align-items:center;justify-content:space-between;padding-top:20px;border-top:1px solid var(--bd);font-size:12px;color:var(--ink4)}

/* ── MISC ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .7s linear infinite;display:inline-block}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.ichip{padding:5px 11px;border-radius:6px;border:1px solid var(--bd);background:var(--paper);font-size:12px;color:var(--ink3)}
.ai-hint{margin-top:28px;padding:16px 20px;background:var(--paper2);border:1px solid var(--bd);border-radius:10px;display:flex;align-items:center;gap:12px}
.ai-ico{width:36px;height:36px;border-radius:8px;background:var(--blue4);border:1px solid var(--blue3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
@media(max-width:900px){
  .silos,.fgrid,.pgrid,.ft{grid-template-columns:1fr 1fr}
  .nav-links{display:none}
}
@media(max-width:640px){
  .silos,.fgrid,.pgrid,.lead-grid,.ft,.how-grid{grid-template-columns:1fr}
  .lead-grid{gap:40px}
  .hkpis{gap:20px;padding:20px 24px}
}
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <div class="ni">
    <a class="logo" href="#">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="9" fill="#1A6BFF"/>
        <ellipse cx="15" cy="18" rx="5.5" ry="5.5" fill="rgba(0,0,0,.7)"/>
        <circle cx="15" cy="18" r="2.5" fill="#00C9A7"/>
        <circle cx="15" cy="18" r="1" fill="#0A0A0F"/>
        <path d="M22 13.5C24.5 15 26 16.4 26 18s-1.5 3-4 4.5" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity=".9"/>
        <path d="M24 10.5C28 12.8 30.5 15.2 30.5 18s-2.5 5.2-6.5 7.5" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity=".5"/>
      </svg>
      <div>
        <div class="lw"><span class="ce">Ce</span><span class="gav">gav</span><span class="li">i</span></div>
        <div style="font-family:var(--fm);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--ink4);margin-top:2px">Experience Intelligence</div>
      </div>
    </a>

    <div class="nav-links" id="nav-links"></div>

    <div class="nr">
      <div class="lang-sw">
        <button class="lang-btn on" id="btn-en" onclick="setLang('en')">EN</button>
        <div class="lang-sep"></div>
        <button class="lang-btn" id="btn-pt" onclick="setLang('pt')">PT</button>
      </div>
      <a class="btn-g" href="#" id="nav-login"></a>
      <a class="btn-p" href="#demo" id="nav-cta"></a>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hc">
    <div class="hero-badge"><div class="bdot"></div><span id="h-badge"></span></div>
    <h1 id="h-title"></h1>
    <p class="hsub" id="h-sub"></p>
    <div class="hact" id="h-actions"></div>
    <div class="hkpis">
      <div class="kpi"><div class="kn b">91%</div><div class="kl" id="kl1"></div></div>
      <div class="ksep"></div>
      <div class="kpi"><div class="kn t">22 min</div><div class="kl" id="kl2"></div></div>
      <div class="ksep"></div>
      <div class="kpi"><div class="kn i">+$70M</div><div class="kl" id="kl3"></div></div>
      <div class="ksep"></div>
      <div class="kpi"><div class="kn t">−23%</div><div class="kl" id="kl4"></div></div>
    </div>
  </div>
</section>

<!-- PROBLEM -->
<section id="problem" class="problem">
  <div class="inner">
    <div class="sl"><span id="s-problem-label"></span></div>
    <h2 id="s-problem-h"></h2>
    <p class="ssub" id="s-problem-sub"></p>
    <div class="silos">
      <div class="silo cx">
        <div class="sico">📡</div>
        <div class="stit" id="silo1-title"></div>
        <div class="sitems" id="silo1-items"></div>
      </div>
      <div class="silo tech">
        <div class="sico">⚡</div>
        <div class="stit" id="silo2-title"></div>
        <div class="sitems" id="silo2-items"></div>
      </div>
      <div class="silo sup">
        <div class="sico">🎫</div>
        <div class="stit" id="silo3-title"></div>
        <div class="sitems" id="silo3-items"></div>
      </div>
    </div>
    <div class="disc">💸 <span id="disc-txt"></span></div>
  </div>
</section>

<!-- HOW -->
<section id="how">

    blue: `color:var(--blue);border-color:var(--blue3);background:var(--blue4)`,

function setLang(lang, save = true) {
  LANG = lang;
  render(lang);
  if (save) localStorage.setItem('cegavi_lang', lang);
}

function detectLang() {
  const saved = localStorage.getItem('cegavi_lang');
  if (saved) return saved;
  const param = new URLSearchParams(window.location.search).get('lang');
  if (param === 'pt' || param === 'en') return param;
  const nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  return nav.startsWith('pt') ? 'pt' : 'en';
}

// ── NAV SCROLL ────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 30);
});

// ── LEAD FORM ─────────────────────────────────────────────────
async function submitLead() {
  const t = T[LANG];
  const name    = document.getElementById('lf-name').value.trim();
  const email   = document.getElementById('lf-email').value.trim();
  const company = document.getElementById('lf-company').value.trim();
  const platform= document.getElementById('lf-platform').value;
  const message = document.getElementById('lf-message').value.trim();
  const msgEl   = document.getElementById('lf-msg');
  const btn     = document.getElementById('lf-btn');

  msgEl.style.display = 'none';
  if (!name)                       { showMsg('err', t.err_name);    return; }
  if (!email || !email.includes('@')) { showMsg('err', t.err_email);   return; }
  if (!company)                    { showMsg('err', t.err_company); return; }

  btn.disabled = true;
  document.getElementById('btn-submit-txt').innerHTML = `<span class="spinning">⟳</span> ${t.btn_sending}`;

  const payload = { name, email, company, platform, message, source:'site', lang: LANG };
  let ok = false;
  try {
    const r = await fetch(`${API_URL}/api/leads`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload), signal:AbortSignal.timeout(5000),
    });
    ok = (await r.json()).ok;
  } catch(_) {
    try {
      const fd = new FormData();
      Object.entries(payload).forEach(([k,v]) => fd.append(k,v));
      const r = await fetch(FORMSPREE, { method:'POST', body:fd, headers:{Accept:'application/json'} });
      ok = r.ok;
    } catch(_) {
      window.location.href = `mailto:contato@cegavi.io?subject=Demo — ${company}&body=${name}%0A${email}%0A${company}`;
      ok = true;
    }
  }

  btn.disabled = false;
  document.getElementById('btn-submit-txt').textContent = t.btn_submit;

  if (ok) {
    document.getElementById('lf-form').style.display = 'none';
    document.getElementById('lf-success').style.display = 'block';
    document.getElementById('lf-success-email').textContent = email;
  } else { showMsg('err', t.err_send); }
}

function showMsg(type, txt) {
  const el = document.getElementById('lf-msg');
  el.className = `lmsg ${type}`;
  el.textContent = (type==='err'?'⚠ ':'✓ ') + txt;
  el.style.display = 'block';
}

setLang(detectLang(), false);
